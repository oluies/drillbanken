name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # JVM toolchain for the Scala.js compile (net-new vs the Node-only reference repo).
      # v5 runs on Node 24 (v4 used the now-deprecated Node 20 action runtime).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1

      # Node toolchain for Vite.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      # Domain/content/app unit tests (Scala.js on node) as a gate.
      - run: sbt -batch domain/test content/test app/test
      # vite build invokes sbt (via @scala-js/vite-plugin-scalajs) → static dist/.
      - run: npm run build

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

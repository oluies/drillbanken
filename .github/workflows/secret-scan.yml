name: Secret scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Pin to a released version (was @main + :latest image — unpinned, re-pulled each run).
      - uses: trufflesecurity/trufflehog@v3.95.7
        with:
          extra_args: --results=verified,unknown
